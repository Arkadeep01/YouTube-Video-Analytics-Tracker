services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - .env.production
    ports:
      - "${PORT:-8002}:8002"
    command: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8002} --reload
    volumes:
      - ./src:/code:rw
    develop:
      watch:
        - action: rebuild
          path: Dockerfile.web
        - action: rebuild
          path: requirements.txt
        - action: rebuild
          path: compose.yaml